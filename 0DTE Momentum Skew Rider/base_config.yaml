# ============================================================
# 0DTE Momentum Skew Rider — Base Configuration
# ============================================================
# CAUTION: These defaults are conservative. Tune only after
# 60+ paper-trading sessions with documented edge verification.
# ============================================================

strategy:
  name: "0DTE_Momentum_Skew_Rider"
  version: "1.0.0"
  mode: "paper"  # ALWAYS start with paper. Change to "live" explicitly.

  # Underlying universe
  universe:
    - "SPY"
    - "QQQ"
    - "SPX"   # Cash-settled, favorable tax treatment

  # Session control
  session:
    # Entry window: avoid first 15 min (wild spreads) and last 60 min (gamma explosion)
    entry_start: "09:45"
    entry_cutoff: "15:00"   # No new positions after this
    hard_close_all: "15:30" # Force close everything — NEVER hold 0DTE to expiry
    timezone: "America/New_York"

    # News blackout periods (in minutes before scheduled release)
    news_blackout_minutes: 30
    avoid_events:
      - "FOMC"
      - "CPI"
      - "NFP"
      - "GDP"
      - "PCE"

# ============================================================
# SIGNAL PARAMETERS
# ============================================================
signals:
  skew:
    # Strike range for skew calculation (% OTM)
    otm_put_strikes: [0.005, 0.01, 0.015, 0.02, 0.025]   # 0.5% to 2.5% OTM
    otm_call_strikes: [0.005, 0.01, 0.015, 0.02, 0.025]

    # Skew signal thresholds
    skew_entry_threshold: 1.8       # IV(put) / IV(call) > 1.8 = bearish skew signal
    skew_reversal_threshold: 0.85   # Skew collapsing = momentum reversal signal
    lookback_periods: 20            # Bars for skew momentum calculation
    min_skew_velocity: 0.05         # Min rate of change to trigger signal

  gex:  # Gamma Exposure
    # GEX > 0: dealers long gamma (suppresses moves, pin effect)
    # GEX < 0: dealers short gamma (amplifies moves, trending)
    positive_gex_threshold: 500_000_000    # $500M+ = strong pin
    negative_gex_threshold: -200_000_000   # -$200M = explosive potential
    gex_flip_zone_bps: 10   # BPS from GEX=0 to consider "flip zone"

  momentum:
    fast_period: 3     # bars
    slow_period: 8     # bars
    signal_period: 2   # EMA of MACD
    min_momentum_score: 0.65   # 0-1 normalized score threshold

  composite:
    # Signal weights — must sum to 1.0
    skew_weight: 0.45
    gex_weight: 0.30
    momentum_weight: 0.25
    min_composite_score: 0.70   # Min weighted score to enter trade

# ============================================================
# TRADE STRUCTURE
# ============================================================
trade_structure:
  # Preferred structures by regime
  trending_regime: "debit_spread"    # Buy ATM, sell OTM (capped risk)
  pinning_regime: "iron_condor"      # Sell strangle, buy wings
  explosive_regime: "long_straddle"  # Only with extreme negative GEX

  # Strike selection
  atm_offset_bps: 5          # Accept strikes within 5bps of ATM
  spread_width_pct: 0.005    # Spread width = 0.5% of underlying

  # Contract parameters
  min_dte: 0
  max_dte: 0                 # ONLY 0DTE — this is the whole point
  min_open_interest: 500     # Liquidity filter
  max_bid_ask_spread_pct: 0.05  # Max 5% bid-ask spread (of mid)

# ============================================================
# EXECUTION PARAMETERS
# ============================================================
execution:
  order_type: "limit"         # NEVER market orders on options
  limit_offset_bps: 0.5       # Start 0.5bps through mid
  max_aggression_bps: 2.0     # Max we'll chase from mid
  retry_interval_seconds: 5
  max_retries: 3
  cancel_unfilled_after: 30   # Seconds

  # Smart order routing priority
  routing_priority: ["best_price", "fastest_fill", "lowest_fee"]

# ============================================================
# LOGGING & MONITORING
# ============================================================
logging:
  level: "INFO"
  structured: true
  log_dir: "logs/"
  metrics_port: 9090    # Prometheus scrape port
  alert_webhook: ""     # Slack/Discord webhook URL
