name: Strategy CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-mock pytest-cov

    - name: Run tests
      run: |
        pytest tests/ -v --cov=src --cov-report=term-missing

    - name: Risk limits validation
      run: |
        python -c "
        import yaml
        with open('config/risk_limits.yaml') as f:
            limits = yaml.safe_load(f)

        # Validate critical limits
        daily_loss = limits['portfolio_risk']['daily_loss_limit_pct']
        assert daily_loss <= 0.03, f'Daily loss limit too high: {daily_loss}'

        max_positions = limits['portfolio_risk']['max_concurrent_positions']
        assert max_positions <= 5, f'Too many concurrent positions: {max_positions}'

        print('Risk limits validation passed')
        "

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - run: pip install black isort mypy
    - run: black --check src/ tests/
    - run: isort --check-only src/ tests/
