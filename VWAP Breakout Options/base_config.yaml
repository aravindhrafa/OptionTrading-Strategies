# ============================================================
# VWAP Breakout Options Play — Base Configuration
# ============================================================
# CAUTION: These defaults are conservative starting points.
# Tune parameters ONLY after 60+ paper sessions with edge proof.
# ============================================================

strategy:
  name: "VWAP_Breakout_Options_Play"
  version: "1.0.0"
  mode: "paper"       # ALWAYS start paper. Change to "live" explicitly.

  universe:
    - "SPY"
    - "QQQ"
    - "AAPL"
    - "NVDA"
    - "TSLA"

  session:
    entry_start: "09:45"          # Skip first 15 min (erratic VWAP)
    entry_cutoff: "15:15"         # No new entries in last 45 min
    hard_close_all: "15:45"       # Force-close all positions before EOD
    timezone: "America/New_York"

    # News/event blackouts (minutes before scheduled release)
    news_blackout_minutes: 30
    avoid_events:
      - "FOMC"
      - "CPI"
      - "NFP"
      - "GDP"
      - "PCE"
      - "EARNINGS"  # Avoid day-of earnings for single stocks

# ============================================================
# SIGNAL PARAMETERS
# ============================================================
signals:
  vwap:
    # VWAP calculation
    use_standard_bands: true
    band_multipliers: [1.0, 2.0, 3.0]   # 1σ, 2σ, 3σ VWAP bands

    # Breakout detection thresholds
    min_break_bps: 8             # Min price displacement from VWAP to qualify
    retest_tolerance_bps: 5      # How close to VWAP counts as a "retest"
    retest_required: true        # Require VWAP retest before full size entry
    retest_timeout_bars: 15      # Bars to wait for retest before cancelling

    # Volume confirmation
    volume_surge_multiplier: 1.8      # Break bar volume must be ≥ 1.8× ADTV
    volume_confirmation_bars: 3       # Confirm volume over N bars
    min_volume_ratio_sustained: 1.3   # Sustained volume > 1.3× avg for continuation

    # Strength / quality filters
    min_break_quality_score: 0.65     # Combined score threshold [0,1]
    max_vwap_distance_for_fade: 0.025 # 2.5% extension triggers fade signal

    # Time-of-day weighting (VWAP breaks mean different things at different times)
    # Higher weight = more reliable breakout signal at that hour
    tod_weights:
      "09:45": 0.70   # Early session — high vol, less reliable
      "10:00": 0.85
      "10:30": 1.00   # Peak reliability window
      "11:00": 1.00
      "11:30": 0.95
      "12:00": 0.75   # Lunch lull — lower weight
      "13:00": 0.80
      "13:30": 0.90
      "14:00": 1.00   # Afternoon session — reliable
      "14:30": 0.95
      "15:00": 0.85
      "15:15": 0.60   # Late session — EOD positioning noise

  volume_profile:
    # Volume Profile / POC (Point of Control) analysis
    profile_lookback_days: 5         # Rolling N-day volume profile
    poc_zone_tolerance_pct: 0.002    # 0.2% = in-zone tolerance for POC
    value_area_pct: 0.70             # Value area = 70% of volume
    hvn_min_volume_ratio: 1.5        # High-Volume Node: ≥ 1.5× avg bar volume
    lvn_max_volume_ratio: 0.5        # Low-Volume Node: ≤ 0.5× avg bar volume
    # LVNs are acceleration zones — fast moves through them
    # HVNs are deceleration zones — price tends to stall

  options_flow:
    # Unusual Options Activity detection
    min_oi_ratio: 2.0                # Volume/OI > 2× = unusual activity
    min_premium_threshold: 50000     # Min $50K premium to qualify as institutional
    sweep_detection: true            # Detect multi-exchange sweeps
    block_trade_threshold: 250000    # $250K+ single trade = block trade (institutional)
    max_staleness_minutes: 5         # Ignore flow older than 5 minutes
    bullish_flow_bias_threshold: 1.5 # Call premium / Put premium > 1.5 = bullish flow

  composite:
    # Signal weights (must sum to 1.0)
    vwap_weight: 0.50
    volume_profile_weight: 0.25
    options_flow_weight: 0.25
    min_composite_score: 0.68        # Minimum to trigger trade

# ============================================================
# TRADE STRUCTURE SELECTION
# ============================================================
trade_structure:
  # Clean breakout with volume: directional debit spread
  type_a_breakout: "debit_spread"
  # Exhaustion/extension: fade via condor or credit spread
  type_b_fade: "iron_condor"
  # Institutional flow detected: more aggressive debit spread
  type_c_flow: "debit_spread"

  # Strike selection
  spread_width_pct: 0.008          # 0.8% width for spreads
  atm_target_delta: 0.40           # Near-ATM entry for strong signals
  otm_target_delta: 0.25           # Further OTM for weaker signals

  # DTE range (VWAP strategy is flexible — not strictly 0DTE)
  min_dte: 0
  max_dte: 5                       # Up to weekly options

  # Liquidity requirements
  min_open_interest: 300
  max_bid_ask_spread_pct: 0.06     # Max 6% bid-ask on options

# ============================================================
# EXECUTION
# ============================================================
execution:
  order_type: "limit"
  limit_offset_bps: 0.5
  max_aggression_bps: 2.5
  retry_interval_seconds: 5
  max_retries: 4
  cancel_unfilled_after: 45        # Seconds (slightly longer than 0DTE)

# ============================================================
# LOGGING & MONITORING
# ============================================================
logging:
  level: "INFO"
  structured: true
  log_dir: "logs/"
  metrics_port: 9091               # Different port from 0DTE strategy
  alert_webhook: ""
